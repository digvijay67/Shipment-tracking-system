version: '3.9'

# ================================================================
#  Shipment Tracking System - Docker Compose
# Handles 5M req/day via horizontal scaling + caching + Kafka
# ================================================================

networks:
  gocomet-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  zookeeper-data:

services:

  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: gocomet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gocometdb
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"


    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - gocomet-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=500
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB

  redis:
    image: redis:7-alpine
    container_name: gocomet-redis
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --tcp-backlog 511
        --timeout 0
        --tcp-keepalive 300
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - gocomet-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: gocomet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - gocomet-net
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 2181" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: gocomet-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    networks:
      - gocomet-net
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - gocomet-net
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic shipment-created --partitions 12 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic shipment-updated --partitions 12 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification-dlq  --partitions 3  --replication-factor 1
      echo 'Kafka topics created successfully'
      "
    restart: on-failure

  # ── Microservices ────────────────────────────────────────────

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: gocomet-user-service
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: gocomet-super-secret-key-for-jwt-signing-2024
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gocomet-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q 'UP'"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  shipment-service:
    build:
      context: ./shipment-service
      dockerfile: Dockerfile
    container_name: gocomet-shipment-service
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: gocomet-super-secret-key-for-jwt-signing-2024
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - gocomet-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q 'UP'"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
    restart: unless-stopped

  tracking-service:
    build:
      context: ./tracking-service
      dockerfile: Dockerfile
    container_name: gocomet-tracking-service
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - gocomet-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q 'UP'"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: gocomet-notification-service
    environment:
      KAFKA_BROKERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - gocomet-net
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.25'
    restart: unless-stopped

  ai-prediction-service:
    build:
      context: ./ai-prediction-service
      dockerfile: Dockerfile
    container_name: gocomet-ai-prediction-service
    environment:
      REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gocomet-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q 'UP'"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: gocomet-api-gateway
    environment:
      USER_SERVICE_HOST: user-service
      SHIPMENT_SERVICE_HOST: shipment-service
      TRACKING_SERVICE_HOST: tracking-service
      AI_SERVICE_HOST: ai-prediction-service
      REDIS_HOST: redis
      JWT_SECRET: gocomet-super-secret-key-for-jwt-signing-2024
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      shipment-service:
        condition: service_healthy
    networks:
      - gocomet-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: gocomet-frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    networks:
      - gocomet-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped

  # ── Load Balancer ─────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: gocomet-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend
    networks:
      - gocomet-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health | grep healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
