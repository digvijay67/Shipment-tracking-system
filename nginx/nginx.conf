worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 10000;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:20m   rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream: API Gateway (scale horizontally)
    upstream api_gateway {
        least_conn;
        server api-gateway:8080 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # Upstream: React Frontend
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # HTTP → HTTPS redirect (in production use SSL)
    server {
        listen 80;
        server_name _;

        # Health check endpoint (bypass rate limit)
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx-lb"}';
            add_header Content-Type application/json;
        }

        # API routes → API Gateway
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            limit_conn conn_limit 50;

            proxy_pass         http://api_gateway/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  5s;
            proxy_read_timeout     60s;
            proxy_send_timeout     60s;
            proxy_buffering        on;
            proxy_buffer_size      8k;
            proxy_buffers          16 8k;

            # CORS headers
            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Auth endpoints get stricter rate limiting
        location /api/users/login {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass http://api_gateway/users/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/users/register {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://api_gateway/users/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend (React SPA)
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            # SPA routing: fallback to index.html
            proxy_intercept_errors on;
            error_page 404 = @frontend_fallback;
        }

        location @frontend_fallback {
            proxy_pass http://frontend;
        }
    }
}
