server:
  port: 8085

spring:
  application:
    name: ai-prediction-service
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
