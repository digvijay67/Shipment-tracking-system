server:
  port: 8082

spring:
  application:
    name: shipment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/gocomet_shipments
    username: ${DB_USER:gocomet}
    password: ${DB_PASS:gocomet123}
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1
      retries: 3
      batch-size: 16384
      linger-ms: 5
      compression-type: lz4

kafka:
  topics:
    shipment-created: shipment-created
    shipment-updated: shipment-updated

cache:
  ttl-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
