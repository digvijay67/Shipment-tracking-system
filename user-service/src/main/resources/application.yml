server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/gocomet_users
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50

app:
  jwt:
    secret: ${JWT_SECRET:gocomet-super-secret-key-for-jwt-signing-2024}
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
